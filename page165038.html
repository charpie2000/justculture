text165152.arrCSSStyles.push('span.text165152Font1 { font-size:19px; font-family:"Montserrat"; color:#ffffff;}');
text165152.addInnerText('<div id=\"text165152\" aria-hidden=\"true\" ><p  legLH=\"1.229\" style=\"margin-left:0px;text-indent:0px;line-height:1.229;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text165152Font1\" style=\"position:relative;top:-1px;\" >It is critical that airworthiness investigators receive honest, accurate and complete information from the individuals involved in an occurrence. It is only with this type of information that investigators can identify all the facts and determine all the circumstances that led to the occurrence. This can only be achieved in an organizational culture in which individuals can freely and openly admit their errors and omissions without fear of recrimination from the organization. This concept requires a commitment from the organization not to use airworthiness investigation information for legal, administrative or disciplinary purposes. In addition, it requires that airworthiness investigators ensure that their reports do not assign blame (or appear to assign blame) for the occurrence.\n</span ></p >\n</div>\n');

text165158.addInnerText('<div id=\"text165158\" aria-hidden=\"true\" ><p  legLH=\"1.229\" style=\"margin-left:0px;text-indent:0px;line-height:1.229;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text165158Font1\" style=\"position:relative;top:-1px;\" >The primary focus of all airworthiness investigations will be to identify effective, practical PMs in a timely manner to the proper Command Authority. In order to do this, all PMs will be based on well-researched information and sound analysis. PMs must clearly articulate the problem, the expected action to rectify the problem and a proposed level of command authority to ensure that the proposed actions are completed. PMs are to be forwarded for consideration and action as soon as practical and need not wait for the formal publishing of reports. Consequently, safety actions can begin quickly as facts are revealed in the investigation, analysis is conducted and appropriate PMs become evident.\n</span ></p >\n</div>\n');
