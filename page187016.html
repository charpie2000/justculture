text187121.addInnerText('<div id=\"text187121\" aria-hidden=\"true\" ><p  legLH=\"1.409\" style=\"margin-left:0px;text-indent:0px;line-height:1.350;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text187121Font1\" style=\"position:relative;top:-2px;\" >During a search and rescue mission involving a critically injured patient, the aircrew decided to knowingly exceed an aircraft limit to transport the patient to the hospital. The limit was an airspeed (Vne) exceedance; when operating at &gt; 81% mast torque, the Vne was 105 KIAS. The aircraft was operated at approximately 90% mast torque (Qm) at 130 KIAS for 5 minutes. The aircrew checklist stated \"When Qm&gt; 81%, Vne is 105 KIAS. If 105 KIAS is exceeded, this is considered a Vne exceedance and not an overtorque condition. Continuing on is at the discretion of the aircraft captain. On landing at a competent maintenance facility, a CF 349 was completed noting the exceedance parameters. This type of Vne exceedance did not require any maintenance action. The only impact was that there was a need to record the exceedance in the log-set for tracking purposes; there was no damage to the aircraft.</span ><span class=\"text187121Font2\" style=\"background-color:transparentposition:relative;top:-2px;\" >\n</span ></p >\n</div>\n');
text187121.build()
