text191341.addInnerText('<div id=\"text191341\" aria-hidden=\"true\" ><p  legLH=\"1.409\" style=\"margin-left:0px;text-indent:0px;line-height:1.350;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text191341Font1\" style=\"position:relative;top:-2px;\" >A technician signed 2 helmets and 2 oxygen masks as serviceable without physically inspecting the items. The investigation revealed that the technician was deployed in Cold Lake and signed equipment as serviceable which was physically in Bagotville. There was no operational reason or any valuable reason mentioned by the technician to do so. There was also a qualified technician who signed the same equipment as serviceable almost at the same time in Bagotville, with a few minutes of difference. This caused a synchro jam alert in the system. The Chain of Command was informed the day after and a review was completed on all documentation that the technician had certified since their arrival in Cold Lake. The expired equipment was not used by the pilots. The technician was removed from duty and the Chain of Command was advised. The technician\'s authorizations were rescinded pending further SAMS/SAMEO reassessment.</span ><span class=\"text191341Font2\" style=\"background-color:transparentposition:relative;top:-2px;\" >\n</span ></p >\n</div>\n');

text191345.addInnerText('<div id=\"text191345\" aria-hidden=\"true\" ><p  legLH=\"1.251\" style=\"margin-left:0px;text-indent:0px;line-height:1.199;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text191345Font1\"  >On final turn at St. John\'s airport, the pilot oversped the landing gear at 280 kts. After landing, the pilot didn\'t open a flight safety nor fill the proper paperwork for maintenance action. Knowing that the gear had just been oversped, and because it was during a weekend, the pilot decided to call the QRA maintainers instead of calling the maintenance on duty personnel from their squadron. During that call, the pilot asked what needed to be looked at and inspected after a gear overspeed. The technician read the CFTO about the inspection requirement. The technician was from a different squadron and didn\'t ask more about the overspeed and the corresponding paperwork thinking that everything was already set up with the pilot\'s squadron. The pilot did a visual check and decided to fly home an unserviceable aircraft with an oversped landing gear that had not been inspected by proper maintenance personnel and deemed safe for flight. The overspeed was only reported to maintenance personnel upon the pilot\'s return to the squadron the following Monday morning.\n</span ></p >\n</div>\n');
